<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Vesak Thorana 2026 - Final Edition</title> <style> body{ margin:0; padding:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; } .thorana-container{ position:relative; width:1000px; height:800px; background:black; cursor:pointer; } /* Buddha halo */ .buddha-halo{ position:absolute; top:45%; left:50%; width:420px; height:420px; transform:translate(-50%, -50%); background:conic-gradient(red,yellow,blue,orange,white,red,yellow); border-radius:50%; z-index:1; filter:blur(15px); opacity:0.6; animation:rotateHalo 8s linear infinite; } /* Buddha Seat */ .buddha-seat{ position:absolute; top:60%; left:50%; width:320px; transform:translateX(-50%); z-index:4; filter: drop-shadow(0 0 15px gold) drop-shadow(0 0 30px orange); } /* Buddha Image (⬇️ moved DOWN) */ .buddha-img{ position:absolute; top:52%; /* 🔥 තව පහලට ගත්තා (48% → 52%) */ left:50%; width:280px; transform:translate(-50%, -50%); z-index:5; filter: drop-shadow(0 0 15px gold) drop-shadow(0 0 35px yellow); animation:none; } /* Story images */ .story-pic{ position:absolute; width:135px; height:135px; border-radius:50%; object-fit:cover; z-index:10; border:3px solid gold; box-shadow:0 0 20px gold; animation:lightPulse 2.5s infinite alternate ease-in-out; } /* Footer */ .footer-banner{ position:absolute; bottom:10px; left:50%; transform:translateX(-50%); width:850px; z-index:20; border-radius:10px; } .play-text{ position:absolute; top:20px; width:100%; text-align:center; color:gold; font-family:'Segoe UI', sans-serif; z-index:30; letter-spacing:1px; text-transform:uppercase; font-size:14px; } @keyframes rotateHalo{ from{ transform:translate(-50%, -50%) rotate(0deg); } to{ transform:translate(-50%, -50%) rotate(360deg); } } @keyframes lightPulse{ 0%{ filter:brightness(1) drop-shadow(0 0 5px gold); transform:scale(1); } 100%{ filter:brightness(1.2) drop-shadow(0 0 25px yellow); transform:scale(1.03); } } @media(max-width:768px){ .thorana-container{ transform:scale(0.55); } } </style> </head> <body> <div class="thorana-container" onclick="startThorana()"> <div class="play-text">Click anywhere to play Audio & Light</div> <div class="buddha-halo"></div> <img class="buddha-seat" src="https://i.ibb.co/s91vLhbS/buddha.png"> <img class="buddha-img" src="https://i.ibb.co/0RGcKfJG/images-removebg-preview.png"> <!-- Stories --> <img class="story-pic" style="top:10px; left:432px;" src="https://i.ibb.co/7t1GBmgq/1-1.gif"> <img class="story-pic" style="top:100px; left:270px;" src="https://i.ibb.co/KxPvFQX0/2.gif"> <img class="story-pic" style="top:100px; left:600px;" src="https://i.ibb.co/4g2KckDT/3.gif"> <img class="story-pic" style="top:260px; left:130px;" src="https://i.ibb.co/BV1NNDZG/4.gif"> <img class="story-pic" style="top:260px; left:740px;" src="https://i.ibb.co/p6fdtj82/5.gif"> <img class="story-pic" style="top:450px; left:100px;" src="https://i.ibb.co/67BhPXcW/6.gif"> <img class="story-pic" style="top:450px; left:285px;" src="https://i.ibb.co/fGqYjgXw/7.gif"> <img class="story-pic" style="top:450px; left:585px;" src="https://i.ibb.co/1Jq29C5G/8.gif"> <img class="story-pic" style="top:450px; left:775px;" src="https://i.ibb.co/spT1V0SS/9.gif"> <img class="footer-banner" src="https://i.ibb.co/hJ9DqmwJ/Whats-App-Image-2026-05-03-at-1-50-32-PM.jpg"> <audio id="vesakSong" loop> <source src=https://files.catbox.moe/o4zoov.m4a> </audio> </div> <script> function startThorana(){ const audio = document.getElementById("vesakSong"); audio.play(); document.querySelector(".play-text").style.display = "none"; } </script> </body> </html>
